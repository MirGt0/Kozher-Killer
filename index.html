<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kozher - Killer Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- لاپەڕەی سەرەکی ڕێکخستنی یارییەکە -->
        <div id="setup-screen" class="screen">
            <h1>Kozher - Killer</h1>
            
            <div class="input-group">
                <label for="player-count">ژمارەی یاریزانان:</label>
                <input type="number" id="player-count" min="3" max="20" value="4">
            </div>

            <div class="input-group">
                <label for="killer-count">ژمارەی کوژەرەکان (Kozher):</label>
                <input type="number" id="killer-count" min="1" max="5" value="1">
            </div>

            <div class="input-group">
                <label for="game-time">کاتی یاری (بە خولەک):</label>
                <input type="number" id="game-time" min="1" max="20" value="5">
            </div>

            <button id="start-btn" class="btn">دەستپێکردنی یاری</button>
        </div>

        <!-- لاپەڕەی پیشاندانی ڕۆڵی یاریزانەکان -->
        <div id="role-screen" class="screen hidden">
            <h2>کارتی یاریزانەکە بکەرەوە</h2>
            <p id="player-number">یاریزانی ١</p>
            
            <div id="card" class="card">
                <div class="card-inner">
                    <div class="card-front">کلیک لێرە بکە بۆ بینینی ڕۆڵەکەت</div>
                    <div class="card-back" id="role-text">شوێنەکە لێرە دەبێت</div>
                </div>
            </div>

            <button id="next-btn" class="btn hidden">یاریزانی داهاتوو</button>
        </div>

        <!-- لاپەڕەی کاتژمێر و بەڕێوەچوونی یارییەکە -->
        <div id="game-screen" class="screen hidden">
            <h2>یارییەکە دەستی پێکرد!</h2>
            <div id="timer">05:00</div>
            
            <h3>لیستی شوێنە گومانلێکراوەکان:</h3>
            <div id="locations-list" class="locations-grid">
                <!-- شوێنەکان بە جاوابسکریپت لێرە دادەنرێن -->
            </div>

            <button id="reset-btn" class="btn danger-btn">کۆتایی هێنان بە یاری</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
